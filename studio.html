<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MIU_33 Studio | Digital Architect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVIGATION -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-black/40 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-white font-mono text-[10px] uppercase tracking-widest">MIU_33 // Home</a>
            <div class="flex gap-6">
                <a href="studio.html" class="text-emerald-neon font-mono text-[10px] uppercase">Studio</a>
                <a href="privacy.html" class="text-white/60 hover:text-emerald-neon font-mono text-[10px] uppercase">Privacy</a>
            </div>
        </div>
    </nav>

    <div class="h-20"></div>

    <canvas id="matrix"></canvas>

    <section class="max-w-7xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-10">

        <div class="monolith p-4 border-emerald-neon/20">
            <h3 class="gold-glow font-mono text-[10px] mb-2 uppercase">[ASSET_01: SYSTEM_LOGIC]</h3>
            <div class="bg-black/50 overflow-hidden border border-white/5">
                <img src="images/asset_01.jpg" class="w-full h-64 object-cover">
            </div>
            <p class="text-[9px] mt-4 font-mono uppercase opacity-60">Physical + Digital Hybrid Framework. [ miu-33 ]</p>
        </div>

        <div class="monolith p-4 border-white/10">
            <h3 class="gold-glow font-mono text-[10px] mb-2 uppercase">[ASSET_02: MODULAR_CORE]</h3>
            <video autoplay loop muted playsinline class="w-full h-64 object-cover opacity-80">
                <source src="videos/prod_shell.mp4" type="video/mp4">
            </video>
            <p class="text-[9px] mt-4 font-mono uppercase opacity-60">Structural Brutalist Shell. [ miu-33 ]</p>
        </div>

        <div class="monolith p-4 border-luxury-gold/20 md:col-span-2">
            <h3 class="gold-glow font-mono text-[10px] mb-2 uppercase">[ASSET_05: SOVEREIGN_MONOLITH]</h3>
            <video autoplay loop muted playsinline class="w-full h-96 object-cover">
                <source src="videos/prod_sovereign.mp4" type="video/mp4">
            </video>
            <p class="text-[9px] mt-4 font-mono uppercase opacity-60">Digital History Sarcophagus // Riyadh Sector. [ miu-33 ]</p>
        </div>

    </section>

    <script type="module" src="js/main.js"></script>
</body>
</html>
