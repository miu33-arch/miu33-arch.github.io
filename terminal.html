<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MIU_33 | CORE TERMINAL</title>
    <style>
        body {
            background-color: #020202;
            color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
        }

        .status-header {
            position: absolute; top: 20px; right: 30px; text-align: right;
            font-size: 0.7rem; color: rgba(0, 242, 255, 0.7); z-index: 20;
        }
        .status-header span { color: #ffcc00; }

        #terminal-log {
            width: 85%; max-width: 900px; height: 50vh;
            overflow-y: auto; text-shadow: 0 0 8px #00f2ff;
            margin-bottom: 20px; z-index: 5; background: rgba(0,0,0,0.4);
            padding: 10px; border: 1px solid rgba(0, 242, 255, 0.1);
        }
        #terminal-log::-webkit-scrollbar { display: none; }

        .line { margin-bottom: 8px; opacity: 0; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .business-nodes { display: flex; gap: 15px; margin-bottom: 20px; z-index: 5; }
        .node-box {
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 12px; font-size: 0.6rem; min-width: 150px;
        }
        .node-box span { display: block; color: #ffcc00; font-size: 0.8rem; margin-top: 5px; }
        .pulse { display: inline-block; width: 6px; height: 6px; background: #00ff00; border-radius: 50%; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .command-line {
            width: 85%; max-width: 900px; display: flex; align-items: center;
            font-size: 1rem; color: #ffcc00; border-top: 1px solid rgba(0, 242, 255, 0.2);
            padding-top: 15px; z-index: 5;
        }

        #user-input {
            background: transparent; border: none; color: #00f2ff;
            font-family: 'Courier New', Courier, monospace; font-size: 1rem;
            flex: 1; margin-left: 10px; outline: none; text-transform: uppercase;
        }
        .status-header {
    position: absolute;
    top: 20px;
    right: 30px;
    text-align: right;
    font-size: 0.7rem;
    color: rgba(0, 242, 255, 0.7);
    line-height: 1.5;
    z-index: 20;
}

.status-header span {
    color: #ffcc00; /* Gold for the active data */
}
#mood-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -2; /* Between the matrix and the obsidian background */
    opacity: 0;
    transition: opacity 2s ease-in-out;
    filter: grayscale(100%) contrast(120%) brightness(30%); /* Keep it "Obsidian" style */
}
.studio-logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: #ffcc00; /* Your signature Gold */
    text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
    margin-bottom: 20px;
    letter-spacing: 5px;
    z-index: 10;
    animation: glitch 3s infinite;
}

@keyframes glitch {
    0% { opacity: 1; }
    95% { opacity: 1; }
    96% { opacity: 0.7; transform: skewX(2deg); }
    97% { opacity: 1; transform: skewX(0deg); }
    100% { opacity: 1; }
}

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
<div id="mood-overlay"></div>
    <div class="status-header">
        NODE: <span>RUH_SA_01</span><br>
        COORDINATES: <span>24.7136° N, 46.6753° E</span><br>
        LOCAL_TIME: <span id="clock">00:00:00</span>
    </div>
<div class="studio-logo">MIU_DIGITAL ARCHITECT STUDIO</div>

    <div id="terminal-log">
        <div class="line" style="animation-delay: 0.5s;">> MIU_33 CORE [ONLINE]</div>
        <div class="line" style="animation-delay: 1.2s;">> MATRIX DATA STREAM: ESTABLISHED</div>
    </div>

    <div class="business-nodes">
        <div class="node-box"><div class="pulse"></div> SHOPIFY_NODE <span>ACTIVE</span></div>
        <div class="node-box"><div class="pulse"></div> PINTEREST_NODE <span>SYNCED</span></div>
    </div>

    <div class="command-line">
        <span>MIU_33@TERMINAL:~#</span>
        <input type="text" id="user-input" autofocus autocomplete="off" inputmode="text" title="Terminal Input">

    </div>

<script>
    /* CLOCK LOGIC */
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerHTML = now.toLocaleTimeString('en-GB', { hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();

    /* MATRIX LOGIC */
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789MIU33";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let i = 0; i < columns; i++) drops[i] = 1;
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 33);

 /* COMMAND LOGIC */
function handleCommand(cmd) {
    const terminal = document.getElementById('terminal-log');
    let response = "";

    // NODE 1: PROTON MAIL
    if (cmd === '/mail') {
        response = "INITIALIZING PROTON_BRIDGE... [ENCRYPTED]";
        window.open('https://mail.proton.me/', '_blank');
    } 
    // NODE 2: FORMSPREE INBOX
    else if (cmd === '/inbox') {
        response = "QUERYING FORMSPREE GATEWAY... [FETCHING SUBMISSIONS]";
        setTimeout(() => { window.open('https://formspree.io/forms/', '_blank'); }, 1000);
    } 
    // NODE 3: PINTEREST VISUALS (MOOD SCRAPER)
    else if (cmd === '/pins') {
        const overlay = document.getElementById('mood-overlay');
        // High-end obsidian architecture mood image
        overlay.style.backgroundImage = "url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070')";
        overlay.style.opacity = "0.4"; 
        
        response = "SCRAPING VISUAL_NODES... [MOOD_BOARD_SYNC]";
        
        // Fade out after 6 seconds
        setTimeout(() => { overlay.style.opacity = "0"; }, 6000); 
        // Launch Pinterest
        setTimeout(() => { window.open('https://www.pinterest.com/miu_DigitalStudio/', '_blank'); }, 2000);
    }
    // SYSTEM STATUS
    else if (cmd === '/status') {
        response = "SYSTEM: 100% OPERATIONAL. ALL NODES (MAIL, INBOX, PINS) SYNCED.";
    } 
    // HELP PROTOCOL
    else if (cmd === '/help') {
        response = "COMMANDS: /mail, /inbox, /pins, /status, /help";
    } 
    else {
        response = `ERR: COMMAND '${cmd}' NOT RECOGNIZED`;
    }

    // Output to Terminal
    const line = document.createElement('div');
    line.className = 'line'; 
    line.style.color = "#ffcc00"; // Signature Gold
    line.innerHTML = `> ${response}`;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
}

const input = document.getElementById('user-input');
input.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const command = this.value.toLowerCase().trim();
        handleCommand(command);
        this.value = '';
    }
});
const terminalInput = document.getElementById('input'); // Adjust to your ID

terminalInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const command = this.value.trim();
        
        // Example: type 'root [your_password]' to unlock
        if (command.startsWith('root ')) {
            const pass = command.split(' ')[1];
            if (pass === 'YOUR_SECURE_KEY') {
                renderDashboard(); // Function that shows your links
                printToTerminal("Access Granted. Systems Online.");
            } else {
                printToTerminal("Error: Invalid Credentials.");
            }
        }
        this.value = '';
    }
});
</script>

</body>
</html>
