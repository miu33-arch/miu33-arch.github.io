        <div class="flex gap-8 items-center">

            <button data-tally-open="gDLdXN" class="text-[10px] border border-emerald-neon px-4 py-1 text-emerald-neon uppercase font-mono italic hover:bg-emerald-neon hover:text-black transition-all">Inquiry</button>
