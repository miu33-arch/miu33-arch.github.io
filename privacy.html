<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Privacy Protocol | MIU_33</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: #a4a4a4; font-family: 'Space Grotesk', sans-serif; }
        .monolith { border: 1px solid rgba(201, 164, 106, 0.2); background: #111; position: relative; overflow: hidden; }
        .monolith::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #C9A46A, transparent); animation: stream 3s linear infinite; }
        @keyframes stream { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .hidden-lang { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full monolith p-10">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-white text-xl font-bold uppercase tracking-tighter">Privacy_Protocol</h1>
            <button onclick="toggle()" class="text-[10px] font-mono text-luxury-gold border border-luxury-gold/30 px-2 py-1">EN/ZH</button>
        </header>
        <div class="text-sm space-y-4">
            <p class="lang-en">Zero third-party trackers. No cookies. No data storage. This site is a static digital cathedral designed for absolute privacy.</p>
            <p class="lang-zh hidden-lang">零第三方追踪器。无 Cookie。无数据存储。本站是一个专为绝对隐私而设计的静态数字大教堂。</p>
        </div>
        <footer class="mt-8 pt-6 border-t border-white/5">
            <a href="index.html" class="font-mono text-emerald-neon text-xs">[ RETURN_TO_STRUCTURE ]</a>
        </footer>
    </div>
    <script>
        function toggle() {
            document.querySelectorAll('.lang-en, .lang-zh').forEach(el => el.classList.toggle('hidden-lang'));
        }
    </script>
</body>
</html>
